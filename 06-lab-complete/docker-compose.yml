version: "3.9"

services:

  # ── AI Agent (can be scaled: docker compose up --scale agent=3) ──
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - APP_VERSION=1.0.0
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - path: .env.local
        required: false  # optional — falls back to .env.example defaults
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Note: no ports exposed — nginx is the single entry point
    networks:
      - agent-net

  # ── Nginx Load Balancer ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-net

  # ── Redis (conversation history + rate limit state) ──────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - agent-net

volumes:
  redis-data:
    driver: local

networks:
  agent-net:
    driver: bridge
