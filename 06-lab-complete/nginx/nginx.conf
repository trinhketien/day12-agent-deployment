worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # JSON structured access log
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"ref":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"upstream":"$upstream_addr",'
        '"rt":"$request_time"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    # Hide Nginx version
    server_tokens off;

    # Upstream: 3 agent instances (set by docker-compose --scale agent=3)
    upstream agent_backend {
        least_conn;  # Route to least-connected instance
        server agent:8000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check — let nginx health pass through directly
        location /health {
            proxy_pass http://agent_backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;  # suppress health check noise
        }

        location /ready {
            proxy_pass http://agent_backend/ready;
            proxy_set_header Host $host;
            access_log off;
        }

        # Main proxy
        location / {
            proxy_pass http://agent_backend;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Timeouts
            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            # Buffer settings
            proxy_buffering         on;
            proxy_buffer_size       4k;
            proxy_buffers           4 32k;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
